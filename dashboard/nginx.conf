server {
    listen       80;
    server_name  _;
    root         /usr/share/nginx/html;
    index        index.html;

    # Reverse-proxy the gateway API
    location /api/ {
        proxy_pass         http://aura-gateway:3000/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
    }

    # Proxy WebSocket
    location /ws {
        proxy_pass         http://aura-gateway:3000/ws;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
